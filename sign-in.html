<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Holiday Directory</title>
    <link rel="stylesheet" href="css/auth-full.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <aside class="auth-visual">
            <a href="home.html" class="auth-brand">
                <i class="fas fa-compass" aria-hidden="true"></i> DIRECTORY
            </a>
            <div class="auth-quote">
                <h2>Welcome back, traveler.</h2>
                <p>Sign in to manage your bookings, save favorite destinations, and discover exclusive holiday deals.</p>
            </div>
        </aside>

        <main class="auth-panel">
            <div class="auth-card">
                <h1>Sign in</h1>
                <p class="auth-subtitle">Enter your credentials to access your account</p>

                <form id="signInForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                        </div>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-lock" aria-hidden="true"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-row">
                        <label><input type="checkbox" name="remember"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-btn">Sign in</button>
                </form>

                <div class="auth-divider">or continue with</div>

                <div class="social-btns">
                    <button type="button" class="social-btn google"><i class="fab fa-google" aria-hidden="true"></i> Google</button>
                    <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f" aria-hidden="true"></i> Facebook</button>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="sign-up.html">Create account</a>
                </p>

                <a href="home.html" class="back-home">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i> Back to home
                </a>
            </div>
        </main>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
