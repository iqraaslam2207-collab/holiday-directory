<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Holiday Directory</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .auth-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .auth-toast--show { opacity: 1; transform: translateY(0); }
        .auth-toast--success { background: #198754; }
        .auth-toast--error { background: #dc3545; }
        .auth-toast--info { background: #007bff; }
    </style>
</head>
<body>
    <div class="auth-page">
        <aside class="auth-visual">
            <a href="new web.html" class="auth-brand">
                <i class="fas fa-compass"></i> DIRECTORY
            </a>
            <div class="auth-quote">
                <h2>Start your journey today.</h2>
                <p>Create an account to book unique vacation rentals and explore destinations like a local.</p>
            </div>
        </aside>

        <main class="auth-panel">
            <div class="auth-card">
                <h1>Create account</h1>
                <p class="auth-subtitle">Join thousands of travelers worldwide</p>

                <form id="signUpForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="fullname">Full name</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                        </div>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required>
                        </div>
                        <div class="password-strength"><span></span></div>
                        <span class="form-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm password</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
                        </div>
                        <span class="form-error"></span>
                    </div>

                    <label class="terms">
                        <input type="checkbox" id="terms" name="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>

                    <button type="submit" class="auth-btn">Create account</button>
                </form>

                <div class="auth-divider">or sign up with</div>

                <div class="social-btns">
                    <button type="button" class="social-btn google"><i class="fab fa-google"></i> Google</button>
                    <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>

                <p class="auth-footer">
                    Already have an account? <a href="website build.html">Sign in</a>
                </p>

                <a href="new web.html" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
</body>
</html>
